<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathSim | User Survey</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4CAF50">
    
</head>
<body>
    <div class="survey-container" id="surveyContainer">
        <div class="survey-header">
            <h1>MathSim User Survey</h1>
            <p>your feedback helps us improve! please complete this survey.</p>
        </div>
        
        <div class="consent-warning" id="consentWarning" style="display: none;">
            You must provide consent before taking this survey. Please return to the consent form.
        </div>
        
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

         <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSdigcGi9DvWbNehb8pe4nm5nqeNJHKCF6jGxKVQZwanWaCAzA/viewform?usp=header">
                Loading survey...
            </iframe>
        
        </div>
    <script>
        // Check if consent was given
        const consentData = localStorage.getItem('mathsim-consent');
        
        if (!consentData) {
            document.getElementById('consentWarning').style.display = 'block';
            document.getElementById('surveyForm').style.display = 'none';
        } else {
            const consent = JSON.parse(consentData);
            if (!consent.given) {
                document.getElementById('consentWarning').style.display = 'block';
                document.getElementById('surveyForm').style.display = 'none';
            }
        }
        
        // Progress tracking
        const form = document.getElementById('surveyForm');
        const progressFill = document.getElementById('progressFill');
        
        function updateProgress() {
            const requiredInputs = form.querySelectorAll('[required]');
            let completed = 0;
            
            requiredInputs.forEach(input => {
                if (input.type === 'radio') {
                    const name = input.name;
                    const checked = form.querySelector(`input[name="${name}"]:checked`);
                    if (checked) completed++;
                } else if (input.type === 'checkbox' && input.required) {
                    if (input.checked) completed++;
                } else if (input.value && input.value.trim() !== '') {
                    completed++;
                }
            });
            
            const percentage = (completed / requiredInputs.length) * 100;
            progressFill.style.width = percentage + '%';
        }
        
        form.querySelectorAll('input, textarea').forEach(input => {
            input.addEventListener('change', updateProgress);
            input.addEventListener('keyup', updateProgress);
        });
        
        updateProgress();
        
        // Form submission
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Collect survey data
            const surveyData = {
                timestamp: new Date().toISOString(),
                age: form.querySelector('input[name="age"]:checked')?.value,
                experience: form.querySelector('input[name="experience"]:checked')?.value,
                ease: form.querySelector('input[name="ease"]:checked')?.value,
                learning: form.querySelector('input[name="learning"]:checked')?.value,
                game: form.querySelector('input[name="game"]:checked')?.value,
                recommend: form.querySelector('input[name="recommend"]:checked')?.value,
                accessibility: Array.from(form.querySelectorAll('input[name="accessibility"]:checked')).map(cb => cb.value),
                likes: form.querySelector('textarea[name="likes"]').value,
                improvements: form.querySelector('textarea[name="improvements"]').value,
                comments: form.querySelector('textarea[name="comments"]').value,
                consent: JSON.parse(consentData)
            };
            
            // Save to localStorage
            localStorage.setItem('mathsim-survey', JSON.stringify(surveyData));
            
            // Track in analytics
            if (typeof analytics !== 'undefined') {
                analytics.trackEvent('Survey', 'Completed', 'Full');
                analytics.trackEvent('Survey-Rating', 'Experience', surveyData.experience);
                analytics.trackEvent('Survey-Rating', 'Ease', surveyData.ease);
                analytics.trackEvent('Survey-Rating', 'Learning', surveyData.learning);
            }
            
            // Show thank you message
            alert('Thank you for completing the survey! Your feedback is greatly appreciated.');
            
            // Redirect to homepage
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
